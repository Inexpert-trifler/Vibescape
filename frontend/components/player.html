<footer class="player-bar glass-panel blur-heavy">
  <div id="yt-player-container" style="position:absolute; width:0; height:0; overflow:hidden;"></div>

  <div class="player-song-info">
    <div class="player-art" id="player-art">🎵</div>
    <div class="player-text">
      <h4 id="player-title">Welcome</h4>
      <p id="player-artist" class="text-sec text-sm mt-1">Select a mood to play real audio</p>
    </div>
  </div>

  <div class="player-controls">
    <div class="control-buttons flex-center gap-3">
      <button class="ctrl-btn text-sec hover-white"><i class="fa-solid fa-shuffle"></i></button>
      <button class="ctrl-btn hover-white"><i class="fa-solid fa-backward-step"></i></button>
      <button id="play-pause-btn" class="play-pause-btn pulse-glow"><i class="fa-solid fa-play"></i></button>
      <button class="ctrl-btn hover-white"><i class="fa-solid fa-forward-step"></i></button>
      <button class="ctrl-btn text-sec hover-white"><i class="fa-solid fa-repeat"></i></button>
    </div>
  </div>
</footer>
