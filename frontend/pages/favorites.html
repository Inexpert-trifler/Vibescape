<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibescape Favorites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/base.css">
</head>
<body class="mood-happy">
  <div class="bg-wrapper">
    <div class="bg-layer base-bg"></div>
    <div class="bg-layer gradient-bg"></div>
    <div class="particles" aria-hidden="true" id="particles"></div>
    <div class="music-waves" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="noise-overlay"></div>
  </div>

  <div class="app-layout">
    <aside class="sidebar glass-panel">
      <a href="index.html" class="brand" style="cursor:pointer; text-decoration:none; color:inherit;">
        <div class="brand-icon">
          <i class="fa-solid fa-wave-square"></i>
        </div>
        <h2>Vibescape</h2>
      </a>
      <nav class="nav-menu">
        <a href="index.html#dashboard" class="nav-link">
          <i class="fa-solid fa-house"></i> <span>Dashboard</span>
        </a>
        <a href="index.html#moods" class="nav-link">
          <i class="fa-solid fa-masks-theater"></i> <span>Moods</span>
        </a>
        <a href="results.html" class="nav-link">
          <i class="fa-solid fa-compact-disc"></i> <span>Results</span>
        </a>
        <a href="favorites.html" class="nav-link active">
          <i class="fa-solid fa-heart"></i> <span>Favorites</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="search-bar glass-panel">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search songs, artists, or moods...">
        </div>
        <div class="user-profile">
          <button class="icon-btn glass-panel"><i class="fa-regular fa-bell"></i><span class="dot"></span></button>
          <div class="avatar-wrap">
            <img src="https://i.pravatar.cc/150?img=68" alt="Profile" class="avatar">
          </div>
        </div>
      </header>

      <div class="pages-container">
        <section class="page active pb-5" style="display:block;">
          <div class="page-header mb-4 line-bottom pb-4">
            <h1 class="d-flex-align">Your Favorites <i class="fa-solid fa-heart fa-bounce text-gradient ml-2"></i></h1>
            <p class="text-sec mt-2">Your saved tracks, ready to replay anytime.</p>
          </div>

          <div id="favorites-container" class="songs-grid mt-5"></div>
          <div id="player" class="mt-5"></div>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="../js/app.js"></script>
</body>
</html>
